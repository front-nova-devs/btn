<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTN - Botón</title>
</head>
<body>

  <!-- Botón principal -->
  <button type="button" id="btn-principal">
    Haz clic aquí
  </button>

  <!-- Botón de envío de formulario -->
  <button type="submit" id="btn-enviar">
    Enviar
  </button>

  <!-- Botón de reset -->
  <button type="reset" id="btn-reset">
    Limpiar
  </button>

  <!-- Botón deshabilitado -->
  <button type="button" id="btn-deshabilitado" disabled>
    Deshabilitado
  </button>

</body>
</html>
